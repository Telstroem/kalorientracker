<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kalorientracker</title>
  <meta name="description" content="Kalorien-, Makro- und Gewichtstracker – lokal, offline, ohne Konto.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f3f6">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0f12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kalorien">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app" class="hidden">
    <main>
      <section id="view-today" class="view"></section>
      <section id="view-weight" class="view hidden"></section>
      <section id="view-history" class="view hidden"></section>
      <section id="view-settings" class="view hidden"></section>
    </main>

    <nav id="tabbar" aria-label="Hauptnavigation">
      <button data-action="tab" data-tab="today" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
        Heute
      </button>
      <button data-action="tab" data-tab="weight">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 8a5.5 5.5 0 0 1 8 0l-2.5 3h-3z"/>
        </svg>
        Gewicht
      </button>
      <button data-action="tab" data-tab="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19V10"/><path d="M10 19V5"/><path d="M16 19v-8"/><path d="M22 19H2"/>
        </svg>
        Verlauf
      </button>
      <button data-action="tab" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/>
        </svg>
        Einstellungen
      </button>
    </nav>
  </div>

  <div id="sheet-backdrop" class="hidden" data-action="close-sheet"></div>
  <div id="sheet" class="hidden" role="dialog" aria-modal="true"></div>
  <div id="onboarding" class="hidden"></div>
  <div id="toast" role="status"></div>
  <input type="file" id="import-file" accept="application/json,.json" hidden>

  <script src="js/calc.js"></script>
  <script src="js/foods.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
